apiVersion: v1
kind: Secret
metadata:
  name: eggcatcher-secrets
  namespace: {{ .Values.app.namespace }}
  labels:
    app.kubernetes.io/managed-by: argocd
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_PASSWORD: {{ required "postgres.password is required" .Values.postgres.password | quote }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  # Full connection string for Flask-SQLAlchemy
  DATABASE_URL: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.name }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
  # Redis URL
  REDIS_URL: "redis://{{ .Values.redis.name }}:{{ .Values.redis.port }}/0"
  # Flask secret key
  SECRET_KEY: {{ required "app.secretKey is required" .Values.app.secretKey | quote }}
