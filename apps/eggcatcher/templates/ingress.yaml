{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.app.namespace }}
  labels:
    app: {{ .Values.app.name }}
    app.kubernetes.io/managed-by: argocd
  annotations:
    # Tell NGINX to use the nginx ingress class
    kubernetes.io/ingress.class: nginx
    # cert-manager will see this annotation and automatically issue a TLS cert
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuer | quote }}
    # Force HTTP → HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Increase proxy timeouts for long-lived game sessions
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.app.name }}-tls   # cert-manager stores the cert here
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  number: 80
{{- end }}
