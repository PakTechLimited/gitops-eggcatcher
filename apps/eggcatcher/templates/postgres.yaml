# ── PostgreSQL Headless Service ───────────────────────────────────────────────
# Headless service gives each pod a stable DNS name: postgres-0.postgres.eggcatcher.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.postgres.name }}
  namespace: {{ .Values.app.namespace }}
  labels:
    app: {{ .Values.postgres.name }}
    app.kubernetes.io/managed-by: argocd
spec:
  clusterIP: None   # headless — required for StatefulSet stable identity
  selector:
    app: {{ .Values.postgres.name }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
---
# ── PostgreSQL StatefulSet ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.postgres.name }}
  namespace: {{ .Values.app.namespace }}
  labels:
    app: {{ .Values.postgres.name }}
    app.kubernetes.io/managed-by: argocd
spec:
  serviceName: {{ .Values.postgres.name }}   # links to headless service above
  replicas: 1                                # single primary for Phase 3
  selector:
    matchLabels:
      app: {{ .Values.postgres.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.postgres.name }}
    spec:
      # Init container — waits for the PVC to be ready before postgres starts
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data"]
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: {{ .Values.postgres.port }}
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: eggcatcher-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: eggcatcher-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eggcatcher-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: {{ .Values.postgres.resources.requests.cpu }}
              memory: {{ .Values.postgres.resources.requests.memory }}
            limits:
              cpu: {{ .Values.postgres.resources.limits.cpu }}
              memory: {{ .Values.postgres.resources.limits.memory }}
          # Readiness probe — pod only receives traffic when PostgreSQL is ready
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $(POSTGRES_USER) -d $(POSTGRES_DB)
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          # Liveness probe — restart pod if PostgreSQL stops responding
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $(POSTGRES_USER) -d $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
  # volumeClaimTemplates — creates a PVC per pod, persists across restarts
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: {{ .Values.postgres.name }}
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.postgres.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
