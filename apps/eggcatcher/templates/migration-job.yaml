{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.app.name }}-db-migrate
  namespace: {{ .Values.app.namespace }}
  labels:
    app: {{ .Values.app.name }}
    app.kubernetes.io/managed-by: argocd
  annotations:
    # Argo CD hook — runs before the main sync, ensures DB is ready before Flask pods start
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300   # auto-clean job pod after 5 minutes
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}-migration
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL before migration..."
              until nc -z {{ .Values.postgres.name }} {{ .Values.postgres.port }}; do
                echo "PostgreSQL not ready — sleeping 2s"
                sleep 2
              done
              echo "PostgreSQL ready — running migration"
      containers:
        - name: db-migrate
          image: {{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          command:
            - python
            - -c
            - |
              import sys
              sys.path.insert(0, '/app')
              from app import create_app, db
              app = create_app()
              with app.app_context():
                  db.create_all()
                  print("DB migration complete — tables created/verified")
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eggcatcher-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: eggcatcher-secrets
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: eggcatcher-secrets
                  key: SECRET_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
{{- end }}
