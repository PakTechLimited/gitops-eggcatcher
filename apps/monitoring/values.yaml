# ── kube-prometheus-stack values ─────────────────────────────────────────────
kube-prometheus-stack:

  # ── Global ──────────────────────────────────────────────────────────────────
  fullnameOverride: prometheus

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    prometheusSpec:
      retention: 7d
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
      # Scrape Flask app metrics from /metrics endpoint
      additionalScrapeConfigs:
        - job_name: eggcatcher-flask
          static_configs:
            - targets:
                - eggcatcher.eggcatcher.svc.cluster.local:80
          metrics_path: /metrics
          scrape_interval: 15s
        # Scrape NGINX ingress metrics
        - job_name: nginx-ingress
          static_configs:
            - targets:
                - ingress-nginx-controller-metrics.ingress-nginx.svc.cluster.local:10254
          scrape_interval: 15s

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    enabled: true
    adminPassword: "PakTechGrafana2026!"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # Persist Grafana dashboards and settings
    persistence:
      enabled: true
      size: 1Gi
      storageClassName: managed-csi
    # Pre-load custom dashboards via ConfigMap
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: eggcatcher
            orgId: 1
            folder: EggCatcher
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/eggcatcher
    dashboardsConfigMaps:
      eggcatcher: grafana-dashboards

  # ── AlertManager ─────────────────────────────────────────────────────────────
  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    config:
      global:
        resolve_timeout: 5m
        slack_api_url: "https://hooks.slack.com/services/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"

      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: slack-alerts
        routes:
          - match:
              severity: critical
            receiver: slack-alerts
            repeat_interval: 1h
          - match:
              severity: warning
            receiver: slack-alerts
            repeat_interval: 4h

      receivers:
        - name: slack-alerts
          slack_configs:
            - channel: "#eggcatcher-alerts"
              send_resolved: true
              icon_emoji: ":egg:"
              username: "EggCatcher Alerts"
              title: '{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}'
              text: |
                {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Description:* {{ .Annotations.description }}
                *Severity:* {{ .Labels.severity }}
                *Namespace:* {{ .Labels.namespace }}
                {{ if .Labels.pod }}*Pod:* {{ .Labels.pod }}{{ end }}
                {{ end }}

  # ── Default alert rules ──────────────────────────────────────────────────────
  defaultRules:
    create: true
    rules:
      alertmanager: true
      etcd: false
      configReloaders: true
      general: true
      k8s: true
      kubeApiserverAvailability: false
      kubeApiserverBurnrate: false
      kubeApiserverHistogram: false
      kubeApiserverSlos: false
      kubeControllerManager: false
      kubelet: true
      kubeProxy: false
      kubeSchedulerAlerting: false
      kubeStateMetrics: true
      network: true
      node: true
      nodeExporterAlerting: true
      nodeExporterRecording: true
      prometheus: true
      prometheusOperator: true
